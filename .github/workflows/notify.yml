name: Gold Rate Notification

on:
  schedule:
    # 8:00 AM PDT  = 15:00 UTC  (US morning)
    - cron: "0 15 * * *"
    # 6:30 PM PDT  = 01:30 UTC  (India morning ≈ 8:00 AM IST)
    - cron: "30 1 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py

      - name: Commit updated price cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update price cache [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
